name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Package Fury Stream Deck zip
        shell: pwsh
        run: |
          ./package-streamdeck.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package Remote Surface zip
        shell: pwsh
        run: |
          ./reason-streamdeck-remote/package-remote.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Compute date tag
        id: tag
        shell: pwsh
        run: |
          function Test-GitTag([string]$Name) {
            git rev-parse -q --verify "refs/tags/$Name" *> $null
            return ($LASTEXITCODE -eq 0)
          }
          $today = (Get-Date).ToUniversalTime().ToString('yyyy.MM.dd')
          # First release of the UTC day is YYYY.MM.DD; later ones are YYYY.MM.DD.2, .3, ...
          if (-not (Test-GitTag $today)) {
            $tag = $today
          } else {
            $n = 2
            while (Test-GitTag "${today}.${n}") { $n++ }
            $tag = "${today}.${n}"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Using release tag: $tag"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        shell: pwsh
        run: |
          gh release create $env:TAG `
            --target $env:GITHUB_SHA `
            --title "Release $env:TAG" `
            --generate-notes `
            --fail-on-no-commits `
            "dist/Reason-Fury-StreamDeck.zip" `
            "dist/Reason-StreamDeck-Remote.zip"
