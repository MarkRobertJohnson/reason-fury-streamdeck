name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package Fury Stream Deck zip
        shell: pwsh
        run: ./package-streamdeck.ps1

      - name: Package Remote Surface zip
        shell: pwsh
        run: ./reason-streamdeck-remote/package-remote.ps1

      - name: Compute date tag
        id: tag
        shell: pwsh
        run: |
          function Test-GitTag([string]$Name) {
            git rev-parse -q --verify "refs/tags/$Name" *> $null
            $exists = ($LASTEXITCODE -eq 0)
            # Missing tags make git exit 1; clear so the step does not inherit it.
            $global:LASTEXITCODE = 0
            return $exists
          }
          $today = (Get-Date).ToUniversalTime().ToString('yyyy.MM.dd')
          if (-not (Test-GitTag $today)) {
            $tag = $today
          } else {
            $n = 2
            while (Test-GitTag "${today}.${n}") { $n++ }
            $tag = "${today}.${n}"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Using release tag: $tag"
          exit 0

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        shell: pwsh
        run: |
          gh release create $env:TAG `
            --target $env:GITHUB_SHA `
            --title "Release $env:TAG" `
            --generate-notes `
            "dist/Reason-Fury-StreamDeck.zip" `
            "dist/Reason-StreamDeck-Remote.zip"
